## Edge Cases & Troubleshooting

### No Complex Tasks Found

**Scenario:** All tasks already have ≤2 steps

**Handling:**
```
Report:
"No complex tasks found. All tasks are already atomic.

Task Analysis:
- Total tasks: X
- Tasks with 1 step: Y
- Tasks with 2 steps: Z
- No splitting needed.

Ready for implementation: /simpletask.implement"
```

### Task Already Very Atomic

**Scenario:** Task has 1 simple step like "Add import statement to file.py"

**Handling:**
- Skip it - do not split
- Keep in atomic_tasks list
- Preserve exactly as-is in final task list

### Task with Multiple Prerequisites

**Scenario:** Original task has `prerequisites: [T001, T002, T005]`

**Handling:**
- First subtask inherits ALL prerequisites: `prerequisites: [T001, T002, T005]`
- Subsequent subtasks depend on previous subtask only
- Example:
  ```yaml
  # Original: prerequisites: [T001, T002]
  
  # After split:
  - id: T010  # First subtask
    prerequisites: [T001, T002]  # Inherits all
  
  - id: T011  # Second subtask
    prerequisites: [T010]  # Only depends on previous
  ```

### Code Example Applies to Multiple Subtasks

**Scenario:** Code example shows pattern used in 3 different subtasks

**Handling:**
- Duplicate the code example to all 3 relevant subtasks
- Each subtask should be self-contained with all context needed
- Redundancy is acceptable to reduce cognitive load

### Split Creates >10 Subtasks

**Scenario:** Original task is extremely complex and splits into 12+ subtasks

**Handling:**
- Proceed with split but add warning
- Report: "⚠ Task 'X' split into 12 subtasks - consider grouping related subtasks"
- Still complete the split - more atomic is better than less

### Prerequisite Chain Becomes Very Long

**Scenario:** After split, have T001 → T002 → T003 → ... → T015 (linear chain)

**Handling:**
- This is expected and correct
- Long chains are fine - they represent natural ordering
- Do NOT try to parallelize if steps must be sequential

### Task Has No Files Array

**Scenario:** Task doesn't specify which files to modify

**Handling:**
- Split by logical steps only
- Don't add `files` array if original didn't have it
- Focus on step-based splitting

### Task Has No Done When Conditions

**Scenario:** Original task missing `done_when` array

**Handling:**
- Generate basic done_when from steps
- Example:
  ```yaml
  steps:
    - Create file src/models/user.py
  done_when:
    - File src/models/user.py exists  # Generated from step
  ```

---

## Important Reminders

**WHY we split tasks:**
- Reduce cognitive load for AI models
- Eliminate ambiguity and decision-making during execution
- Ensure ANY LLM can execute tasks correctly
- Make each task verifiable independently
- Enable better parallelization where possible

**WHAT makes a good subtask:**
- 1-2 steps only
- 5-10 minute completion time
- Single clear objective
- No ambiguity or decisions
- Self-contained with all context needed

**WHAT to avoid:**
- Subtasks that require multiple decisions
- Subtasks that modify multiple unrelated files
- Subtasks with vague goals like "Set up feature"
- Subtasks that depend on unclear state

**After splitting:**
- All task IDs are sequential (T001, T002, T003...)
- All prerequisites use new IDs
- All subtasks have ≤2 steps
- Task file validates successfully
- Ready for /simpletask.implement
"""

## CLI Command Reference

### View Task Information

**Preferred: Use MCP tools** (if simpletask MCP server is available)
```
Use simpletask_get() MCP tool to retrieve complete task data:
- Returns SimpleTaskGetResponse with spec and summary
- spec.tasks: array of all tasks with full details
- summary: pre-computed status counts

Filter and query the response data:
- Filter spec.tasks by status field: "not_started", "in_progress", "completed", "blocked"
- Count tasks: len(spec.tasks)
- Get task by ID: next((t for t in spec.tasks if t.id == "T001"), None)
```

**Fallback: Use CLI** (if MCP tools not available)
```bash
# Show full task details
simpletask show

# List all tasks
simpletask task list

# List tasks by status
simpletask task list --status not_started
simpletask task list --status completed
```

### Remove Tasks

**Preferred: Use MCP tools** (if simpletask MCP server is available)
```
Use simpletask_task() MCP tool:

# Remove a task
simpletask_task(action="remove", task_id="T001")

# Returns SimpleTaskWriteResponse with confirmation
```

**Fallback: Use CLI** (if MCP tools not available)
```bash
# Remove a task
simpletask task remove T001
```

### Add Tasks

**Preferred: Use MCP tools** (if simpletask MCP server is available)
```
Use simpletask_task() MCP tool:

# Add a task (basic fields only)
simpletask_task(
  action="add",
  name="Task name",
  goal="Task goal description",
  steps=["Step 1", "Step 2"]
)

# Returns SimpleTaskWriteResponse with new task ID

# Then edit .tasks/[branch].yml directly to add:
# - done_when
# - files
# - code_examples
# - prerequisites
```

**Fallback: Use CLI** (if MCP tools not available)
```bash
# Add a task
simpletask task add "Task name" -g "Task goal description"

# Then edit .tasks/[branch].yml directly to add full details
```

### Validation

**Preferred: Use MCP tools** (if simpletask MCP server is available)

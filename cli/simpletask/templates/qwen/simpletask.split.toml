**Step 4.1: Distribute Task Attributes**

For each generated subtask, properly distribute attributes from the original task:

**Prerequisites:**
- **First subtask:** Inherits ALL prerequisites from original task
- **Subsequent subtasks:** Depend on previous subtask in the chain
- **Exception:** Parallel subtasks (e.g., multiple independent tests) can share same prerequisite

**File Actions:**
- Distribute `files` array entries to relevant subtasks
- Each subtask should typically modify only 1 file
- If subtask creates file: `action: create`
- If subtask modifies file: `action: modify`

**Done When Conditions:**
- Distribute `done_when` conditions to relevant subtasks
- Each subtask should have 1-2 specific done_when conditions
- Ensure conditions are verifiable (command output, file existence, test passes)

**Code Examples:**
- Analyze which subtask each `code_examples` entry applies to
- Attach code example to the most relevant subtask
- If code example shows overall pattern, attach to first subtask
- If code example applies to multiple subtasks, duplicate it

**Example of attribute distribution:**

**Original task:**
```yaml
- id: T001
  name: Create User model
  prerequisites: [T000]  # Some earlier task
  files:
    - path: src/models/user.py
      action: create
  done_when:
    - File exists at src/models/user.py
    - User model can be imported
    - Password hashing works correctly
  code_examples:
    - language: python
      description: SQLAlchemy model pattern
      code: |
        from sqlalchemy import Column, Integer, String
        class User(Base):
            id = Column(Integer, primary_key=True)
```

**After splitting - attribute distribution:**
```yaml
- id: T001
  name: Create User model file with base structure
  prerequisites: [T000]  # Inherited from original
  files:
    - path: src/models/user.py
      action: create
  done_when:
    - File exists at src/models/user.py
    - User model can be imported
  code_examples:
    - language: python
      description: SQLAlchemy model pattern
      code: |
        from sqlalchemy import Column, Integer, String
        class User(Base):
            id = Column(Integer, primary_key=True)

- id: T002
  name: Add User model fields
  prerequisites: [T001]  # Depends on previous subtask
  files:
    - path: src/models/user.py
      action: modify
  done_when:
    - User model has all required fields defined

- id: T003
  name: Add password hashing methods
  prerequisites: [T002]
  files:
    - path: src/models/user.py
      action: modify
  done_when:
    - Password hashing works correctly
```

**Step 5: Remove Original Complex Tasks**

For EACH task in complex_tasks, remove it from the task file.

**Preferred: Use MCP tool** (if simpletask MCP server is available)
```
For each task in complex_tasks:
  Use simpletask_task() MCP tool:
  - Call simpletask_task(action="remove", task_id=task.id)
  - Returns SimpleTaskWriteResponse confirming removal
```

**Fallback: Use CLI** (if MCP tools not available)
```bash
# For each complex task
simpletask task remove T001
simpletask task remove T003
simpletask task remove T005
# ... etc
```

**Step 6: Add All Generated Subtasks**

For EACH subtask generated in Step 4, add it to the task file.

**Preferred: Use MCP tool** (if simpletask MCP server is available)
```
For each subtask in generated_subtasks:
  Use simpletask_task() MCP tool:
  - Call simpletask_task(
      action="add",
      name=subtask.name,
      goal=subtask.goal,
      steps=subtask.steps  # Pass as list of strings
    )
  - Returns SimpleTaskWriteResponse with new task ID
  - Store returned task ID for prerequisite mapping
```

**Important:** The MCP `task()` tool only accepts name, goal, and steps. Other fields (done_when, files, code_examples, prerequisites) must be added by editing the YAML file directly.

After adding all subtasks via MCP, edit `.tasks/[branch].yml` directly to add:
- `done_when` conditions
- `files` array
- `code_examples` array
- `prerequisites` array

**Fallback: Use CLI** (if MCP tools not available)
```bash
# For each subtask
simpletask task add "Create User model file with base structure" \\
  -g "Create src/models/user.py with SQLAlchemy imports and User class skeleton"

simpletask task add "Add User model fields" \\
  -g "Add id, email, password_hash, created_at columns to User model"

# ... etc

# Then edit .tasks/[branch].yml directly to add done_when, files, code_examples, prerequisites
```

**Step 7: Renumber Task IDs Sequentially**

**CRITICAL:** After removing originals and adding subtasks, task IDs are likely non-sequential (e.g., T001, T002, T015, T016, T017). This step renumbers ALL tasks to be sequential: T001, T002, T003, T004...

**7.1: Load Updated Task File**

**Preferred: Use MCP tool**
```
Use simpletask_get() MCP tool:
- Call simpletask_get(branch=None)
- Returns spec with all current tasks
```

**Fallback: Use CLI**
```bash
simpletask show
```

**7.2: Create ID Mapping**

Build a mapping of old task IDs to new sequential IDs:

```
old_to_new_id = {}
tasks = spec.tasks  # All tasks in current order

for index, task in enumerate(tasks):
    new_id = f"T{(index + 1):03d}"  # T001, T002, T003...
    old_to_new_id[task.id] = new_id
```

Examples:
- T001 → T001 (unchanged)
- T002 → T002 (unchanged)
- T015 → T003 (renumbered)
- T016 → T004 (renumbered)
- T017 → T005 (renumbered)

**7.3: Update Task IDs and Prerequisites**

Edit `.tasks/[branch].yml` directly:

1. For each task:
   - Update `id` field using old_to_new_id mapping
   
2. For each task with `prerequisites`:
   - Update each prerequisite ID using old_to_new_id mapping
   - Example: `prerequisites: [T015, T016]` → `prerequisites: [T003, T004]`

**7.4: Verify Renumbering**

After renumbering, verify:
- All task IDs are sequential: T001, T002, T003, T004, T005...
- No gaps in numbering
- All prerequisite references use new IDs
- No prerequisite references point to non-existent tasks

**Step 8: Validate and Report**

**8.1: Validate Task File Schema**

**Preferred: Use MCP tool** (if simpletask MCP server is available)
```
Use simpletask_get() MCP tool with validation:
- Call simpletask_get(branch=None, validate=True)
- Check validation.valid in response
- If validation.valid is False, check validation.errors for details

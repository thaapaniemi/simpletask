## Splitting Strategy Guidelines

### When to Split Aggressively

**Always split if the task involves:**

1. **Multiple files** - Each file operation should be separate
2. **Multiple methods/functions** - Each method should be separate
3. **Create + Configure** - Split setup from implementation
4. **Implementation + Testing** - Split code from tests
5. **Multiple test cases** - Each test case separate

### When to Keep Tasks Together

**Do NOT split if:**

1. **Single atomic operation** - One file, one function, one purpose
2. **Tightly coupled steps** - Steps cannot be verified independently
3. **Context-dependent** - Bug fixes where full context prevents regressions

### Subtask Size Guidelines

**Target metrics for each subtask:**

- **1-2 steps** maximum
- **5-10 minutes** to complete
- **1 file** modified (preferably)
- **1-2 done_when** conditions
- **No decisions** left to implementer

**If a subtask takes >10 minutes or has >2 steps, it should be split further.**

### Prerequisite Chain Design

**Linear chains** (sequential dependencies):
```yaml
T001 → T002 → T003 → T004
```
Each task depends on the one before it.

**Parallel branches** (independent work):
```yaml
     → T002
T001 → T003 → T005
     → T004
```
T002, T003, T004 can run in parallel after T001.

**Converging dependencies** (join point):
```yaml
T001 → T003
T002 → T003
```
T003 requires both T001 and T002 complete.


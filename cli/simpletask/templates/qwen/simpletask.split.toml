description = "Split complex tasks into atomic subtasks to reduce cognitive load for AI execution"

prompt = """
User input: {{args}}

**Purpose:** This tool ensures AI models/LLMs have minimal context to think about per task, guaranteeing each subtask is handled correctly with best practices. By splitting complex tasks into ultra-atomic units (1-2 steps, 5-10 minutes), we eliminate ambiguity and decision-making during implementation.

**CRITICAL: This is a TASK REFINEMENT phase. You will automatically split ALL complex tasks, remove originals, add subtasks, renumber IDs, and update the task file. No preview, no confirmation - execute immediately.**

**Step 1: Load Task File**

1. Get current git branch name:
   ```bash
   git branch --show-current
   ```

2. Load task file using MCP tools (with CLI fallback):
   
   **Preferred: Use MCP tool** (if simpletask MCP server is available)
   ```
   Use simpletask_get() MCP tool to retrieve task data:
   - Call simpletask_get(branch=None) to use current git branch
   - Returns SimpleTaskGetResponse with spec, file_path, and summary
   - If error occurs, task file does not exist
   ```
   
   **Fallback: Use CLI** (if MCP tools not available)
   ```bash
   simpletask show
   ```
   
   If task file not found:
   - Report: "No task file found for current branch. Run /simpletask.plan first."
   - STOP - cannot proceed without task file

**Note:** Branch names with slashes (e.g., `feature/user-auth`) are automatically normalized to filenames with hyphens (e.g., `.tasks/feature-user-auth.yml`). The MCP tools and CLI commands handle normalization automatically.

**Step 2: Identify Tasks to Split**

Analyze all tasks in `spec.tasks` array to determine which need splitting.

**A task MUST be split if it meets ANY of these criteria:**

1. **Step count:** Has >2 steps in the `steps` array
2. **File actions:** Has >1 file in the `files` array
3. **Done conditions:** Has >3 conditions in `done_when` array
4. **Goal complexity:** Goal description is >100 characters

**SKIP splitting (task is already atomic) if:**

1. **Single atomic step:** Has exactly 1 step AND step description is <50 characters
2. **Already atomic:** Task name contains keywords indicating atomic work:
   - "Add import"
   - "Update version"
   - "Fix typo"
   - "Remove unused"
   - "Rename variable"
3. **Bug fix context:** Task name starts with "Fix:" (bug fixes often need full context to avoid breaking changes)

**Process:**

**Preferred: Use MCP tool** (if simpletask MCP server is available)
```
From simpletask_get() response:
- Iterate through spec.tasks array
- For each task, evaluate against split criteria
- Store tasks that need splitting in complex_tasks list
- Store tasks to keep as-is in atomic_tasks list
```

**Fallback: Use CLI** (if MCP tools not available)
```bash
# List all tasks to analyze
simpletask task list
# Manually evaluate each task against criteria
```

**Step 3: Analyze Each Complex Task**

For EACH task in complex_tasks, perform detailed analysis to determine optimal splitting strategy.

**3.1: Understand Task Structure**

Extract from the task:
- `name`: Current task name
- `goal`: What the task accomplishes
- `steps`: Array of implementation steps
- `files`: Array of file actions (create/modify/delete)
- `done_when`: Array of completion conditions
- `code_examples`: Code patterns to follow
- `prerequisites`: Tasks that must complete first

**3.2: Identify Logical Breakpoints**

Analyze the task to find natural splitting points:

**Pattern Recognition:**

1. **File-based split** - Multiple files involved:
   - Each file operation becomes a separate subtask
   - Order: create → modify → delete

2. **Method/Function-based split** - Multiple methods to implement:
   - Each method becomes a separate subtask
   - Order by dependencies (base method → derived methods)

3. **Layer-based split** - Multiple layers touched:
   - Model/Schema definition
   - Business logic implementation
   - API endpoint creation
   - Validation logic
   - Test implementation

4. **Test-based split** - Multiple test cases:
   - Each test case or test group becomes a subtask
   - Order: happy path → error cases → edge cases

5. **Configuration-based split** - Setup + implementation:
   - Configuration/setup
   - Core implementation
   - Integration/wiring

**3.3: Use Explore Agent for Intelligent Splitting**

For complex tasks where the splitting strategy is not obvious, use the Task tool with explore agent:

```
Task(
  subagent_type="explore",
  description="Analyze task structure for splitting",
  prompt="Analyze the following task to determine optimal splitting strategy:

Task: [task.name]
Goal: [task.goal]
Steps: [task.steps]
Files: [task.files]

Identify:
- Natural logical breakpoints
- File dependencies and ordering
- Method/function boundaries
- Test groupings
- Configuration vs implementation steps

Recommend: Optimal way to split this into 1-2 step subtasks (5-10 min each)
Thoroughness: quick"
)
```

The explore agent will provide insights on:
- How existing similar code is structured
- Natural boundaries in the codebase
- Optimal splitting points

**Step 4: Generate Subtask Breakdown**

For EACH complex task, generate a list of atomic subtasks following these patterns.

**Subtask Generation Rules:**

1. **Each subtask MUST have:**
   - 1-2 steps maximum (preferably 1 step)
   - Single clear objective
   - Completable in 5-10 minutes
   - No ambiguity - any LLM can execute without clarification

2. **Subtask naming convention:**
   - Action-oriented verb + specific target
   - Max 60 characters
   - Examples:
     - ✅ "Create User model file with base structure"
     - ✅ "Add email field to User model"
     - ✅ "Implement hash_password method"
     - ❌ "Work on User model" (too vague)
     - ❌ "Create User model and add all fields and methods" (too broad)

3. **Subtask goal convention:**
   - One clear sentence (30-80 characters)
   - Specific outcome described
   - Examples:
     - ✅ "Create src/models/user.py with SQLAlchemy imports and User class skeleton"
     - ✅ "Add id, email, password_hash, created_at columns to User model"
     - ❌ "Set up user model" (too vague)

4. **Subtask steps:**
   - 1-2 concrete actions
   - Include specific file paths, function names, variable names
   - No decisions left to implementer
   - Examples:
     - ✅ "Create file src/models/user.py with imports: from sqlalchemy import Column, String, DateTime; from .base import Base"
     - ✅ "Define User class inheriting from Base with __tablename__ = 'users'"
     - ❌ "Create user model file" (lacks detail)

**Common Splitting Patterns:**

### Pattern 1: Model/Class Creation

**Before:**
```yaml
- id: T001
  name: Create User model
  goal: Define User database model with authentication fields
  steps:
    - Create src/models/user.py
    - Define User class with id, email, password_hash, created_at
    - Add unique constraint on email
    - Add password hashing methods
```

**After (split into 5 atomic subtasks):**
```yaml
- id: T001
  name: Create User model file with base structure
  goal: Create src/models/user.py with SQLAlchemy imports and User class skeleton
  steps:
    - Create file src/models/user.py with imports and User class inheriting from Base
  done_when:
    - File src/models/user.py exists and can be imported without errors
  
- id: T002
  name: Add User model fields
  goal: Add id, email, password_hash, created_at columns to User model
  steps:
    - Define Column fields: id (Integer, primary_key), email (String), password_hash (String), created_at (DateTime)
  done_when:
    - User model has all four fields defined
  prerequisites:
    - T001
  
- id: T003
  name: Add email unique constraint
  goal: Ensure email uniqueness at database level
  steps:
    - Add unique=True parameter to email Column definition
  done_when:
    - Email field has unique constraint in model definition
  prerequisites:
    - T002
  
- id: T004
  name: Implement hash_password method
  goal: Add password hashing using bcrypt
  steps:
    - Add static method hash_password(password: str) -> str to User class using bcrypt.hashpw
  done_when:
    - Method exists and can hash a test password
  prerequisites:
    - T002
  
- id: T005
  name: Implement verify_password method
  goal: Add password verification method
  steps:
    - Add method verify_password(self, password: str) -> bool using bcrypt.checkpw
  done_when:
    - Method exists and can verify hashed passwords
  prerequisites:
    - T004
```

### Pattern 2: API Endpoint Implementation

**Before:**
```yaml
- id: T002
  name: Implement /login endpoint
  goal: Create login endpoint with validation and JWT
  steps:
    - Create src/api/auth.py
    - Add POST /login endpoint skeleton
    - Add request validation
    - Add password verification
    - Add JWT token generation
    - Add error handling
```

**After (split into 6 atomic subtasks):**
```yaml
- id: T006
  name: Create auth routes file
  goal: Create src/api/auth.py with router setup
  steps:
    - Create file src/api/auth.py with FastAPI router initialization
  
- id: T007
  name: Add /login endpoint skeleton
  goal: Define POST /login route with empty handler
  steps:
    - Add @router.post("/login") endpoint returning placeholder response
  prerequisites:
    - T006
  
- id: T008
  name: Add login request validation
  goal: Validate email and password in request body
  steps:
    - Create LoginRequest Pydantic model with email and password fields
    - Update /login endpoint to accept LoginRequest body
  prerequisites:
    - T007
  
- id: T009
  name: Implement password verification logic
  goal: Check user exists and password matches
  steps:
    - Query User by email, return 401 if not found
    - Call user.verify_password(password), return 401 if fails
  prerequisites:
    - T008
  
- id: T010
  name: Add JWT token generation
  goal: Generate and return JWT token on successful login
  steps:
    - Create JWT token with user_id claim using pyjwt
    - Return token in response body
  prerequisites:
    - T009
  
- id: T011
  name: Add login error handling
  goal: Handle exceptions and return appropriate error responses
  steps:
    - Wrap login logic in try/except for database and JWT errors
    - Return 500 with error message on exceptions
  prerequisites:
    - T010
```

### Pattern 3: Multi-File Feature

**Before:**
```yaml
- id: T003
  name: Add authentication middleware
  goal: Protect API routes with JWT validation
  steps:
    - Create middleware in src/middleware/auth.py
    - Implement token extraction from headers
    - Implement token validation logic
    - Update main.py to register middleware

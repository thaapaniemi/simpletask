# yaml-language-server: $schema=simpletask.schema.json
schema_version: "1.0"
branch: add-delete-todo
title: Add delete functionality to todo items
original_prompt: "Users should be able to delete todos by clicking a delete button"
status: not_started
created: "2026-01-18T10:00:00Z"
updated: "2026-01-18T10:00:00Z"

acceptance_criteria:
  - id: AC1
    description: Each todo item displays a delete button
    completed: false
  - id: AC2
    description: Clicking delete removes the todo from the list
    completed: false
  - id: AC3
    description: Deleted todos are removed from localStorage
    completed: false

constraints:
  - "Do not modify the existing Todo component structure"
  - "Use existing CSS classes for button styling"

context:
  related_files:
    - src/components/TodoItem.jsx
    - src/hooks/useTodos.js
  dependencies:
    - name: react
      purpose: UI framework

tasks:
  - id: T001
    name: Add delete button to TodoItem
    status: not_started
    goal: Add a delete button to each todo item component
    steps:
      - Open src/components/TodoItem.jsx
      - Add delete button after the todo text
      - Apply existing btn-danger CSS class
    done_when:
      - Delete button renders next to each todo
      - Button has correct styling
    files:
      - path: src/components/TodoItem.jsx
        action: modify

  - id: T002
    name: Implement delete handler
    status: not_started
    goal: Wire up delete button to remove todo from state
    steps:
      - Add deleteTodo function to useTodos hook
      - Pass delete handler as prop to TodoItem
      - Connect button onClick to handler
    done_when:
      - Clicking delete removes todo from UI
      - localStorage is updated
    prerequisites:
      - T001
    files:
      - path: src/hooks/useTodos.js
        action: modify
      - path: src/components/TodoItem.jsx
        action: modify
